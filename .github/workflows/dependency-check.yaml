name: Dependency Check

on: [ push ]

jobs:

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          show-progress: false

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up OWASP database cache key and restore keys
        run: |
          echo "YEAR=$(date -u +'%Y')" >> "$GITHUB_ENV"
          echo "MONTH=$(date -u +'%Y-%m')" >> "$GITHUB_ENV"
          echo "DAY=$(date -u +'%Y-%m-%d')" >> "$GITHUB_ENV"
          echo "HOUR=$(date -u +'%Y-%m-%d-%H')" >> "$GITHUB_ENV"

      - name: Cache OWASP database
        uses: actions/cache@v6
        with:
          path: target/owasp/data
          key: owasp-data-${{ env.HOUR }}
          restore-keys: |
            owasp-data-${{ env.DAY }}
            owasp-data-${{ env.MONTH }}
            owasp-data-${{ env.YEAR }}
            owasp-data

      - name: Run dependency check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn -B org.owasp:dependency-check-maven:check --file pom.xml

      - name: Upload dependency check report
        if: ${{ hashFiles('target/dependency-check-report.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: target/dependency-check-report.sarif
          category: dependency-check
